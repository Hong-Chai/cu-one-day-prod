{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">Вход</h3>
                
                {% if form.errors %}
                    <div class="alert alert-danger">
                        {% for field, errors in form.errors.items %}
                            {% for error in errors %}
                                <div>{{ error }}</div>
                            {% endfor %}
                        {% endfor %}
                    </div>
                {% endif %}
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="{{ form.username.id_for_label }}" class="form-label">Имя пользователя</label>
                        <input type="text" class="form-control" name="{{ form.username.name }}" id="{{ form.username.id_for_label }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="{{ form.password.id_for_label }}" class="form-label">Пароль</label>
                        <input type="password" class="form-control" name="{{ form.password.name }}" id="{{ form.password.id_for_label }}" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">Войти</button>
                </form>
                
                <div class="text-center">
                    <p class="mb-2">Нет аккаунта? <a href="{% url 'users:signup' %}" class="text-decoration-none">Зарегистрироваться</a></p>
                    <a href="{% url 'users:password_reset' %}" class="text-muted small">Забыли пароль?</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
